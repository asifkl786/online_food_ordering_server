spring.application.name=online-food-ordering-system
# =====================================================
# APPLICATION CONFIGURATION
# =====================================================
server.port=8080


# =====================================================
# DATABASE CONFIGURATION (PostgreSQL)
# =====================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/online_food_order_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver


# =====================================================
# JPA / HIBERNATE CONFIGURATION
# =====================================================
# Automatically create and update tables (for dev)
spring.jpa.hibernate.ddl-auto=update
#spring.flyway.enabled=false

# Show SQL queries in console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# =====================================================
# FILE UPLOAD CONFIGURATION
# =====================================================
# Directory where uploaded files will be stored (create this folder manually)
file.upload-dir=uploads/documents

# Maximum upload size (example: 10MB file, 20MB total request)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB


# =====================================================
# LOGGING CONFIGURATION
# =====================================================
# Log file location and logging level
logging.level.root=INFO
logging.level.com.documentms=DEBUG
logging.file.name=logs/documentms.log
logging.level.org.springframework.security=DEBUG
logging.level.com.dms=DEBUG
# Log pattern for console output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


# =====================================================
# CORS CONFIGURATION (Optional if frontend will connect)
# =====================================================
# You can configure allowed origins for frontend (React, etc.)
app.cors.allowed-origins=http://localhost:5173

# JWT
app.jwt.secret=replace_with_a_long_random_256_bit_secret_at_least_32_bytes
app.jwt.expiration-ms=3600000
